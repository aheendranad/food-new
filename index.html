<section class="food-section" id="hotels">

    <div class="search-box">
        <input type="text" id="hotelSearch" placeholder="🔍 Search Hotels...">
    </div>

    <div class="food-grid">

        <div class="card">
            <div class="card-content">
                <h3>Delex Hotel</h3>
                <p>Leftover meals available at 50% discount.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Paragon Restaurant</h3>
                <p>Fresh unsold food available every evening.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Halal Mandhi</h3>
                <p>Discounted Mandhi and rice dishes.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Kamath Restaurant</h3>
                <p>South Indian meals at affordable prices.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Kashraf Restaurant</h3>
                <p>Special food packs available daily.</p>
            </div>
        </div>

    </div>

</section>

<style>
.search-box{
    text-align:center;
    margin-bottom:40px;
}

.search-box input{
    width:80%;
    max-width:500px;
    padding:15px;
    border:2px solid #ff6b35;
    border-radius:30px;
    font-size:18px;
    outline:none;
}
</style>

<script>
document.getElementById("hotelSearch").addEventListener("keyup", function() {

    let filter = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(function(card) {

        let hotelName = card.querySelector("h3").textContent.toLowerCase();

        if (hotelName.includes(filter)) {
            card.style.display = "";
        } else {
            card.style.display = "none";
        }

    });

});
</script>
